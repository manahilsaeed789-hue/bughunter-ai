<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BugHunter AI</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div data-nav></div>
    <main class="shell hero">
      <section class="hero-copy stack">
        <span class="eyebrow">Critical bug detection platform</span>
        <h1>BugHunter AI</h1>
        <p>Analyze recent repository commits, suppress duplicate findings with persistent memory, and surface only high-confidence production-critical defects.</p>
        <div class="row">
          <a class="button" href="analysis.html">Start Analysis</a>
          <a class="button secondary" href="dashboard.html">View Dashboard</a>
        </div>
      </section>
      <section class="panel stack">
        <h2>Run a Scan</h2>
        <form class="stack" data-analysis-form>
          <label>GitHub repository URL
            <input name="repository_url" placeholder="https://github.com/org/repository">
          </label>
          <div class="grid-2">
            <label>Branch
              <input name="branch" value="main">
            </label>
            <label>Commit limit
              <input name="commit_limit" type="number" min="1" max="50" value="8">
            </label>
          </div>
          <button class="button" type="submit">Analyze Repository</button>
        </form>
        <pre class="terminal" data-output>No scan running.</pre>
      </section>
    </main>
    <script src="js/app.js"></script>
  </body>
</html>
